<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>404 · Page Not Found — AstroScan</title>
  <link rel="icon" type="image/x-icon" href="/astroscan_bot/favicon.ico">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: radial-gradient(ellipse at 30% 40%, #120c2c, #0a0718);
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      color: #f0eaff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .box { max-width: 480px; }
    h1 { font-size: 3rem; background: linear-gradient(135deg, #fff, #b76eff, #ff61d0); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 1rem; }
    p { color: #b9b0d9; margin-bottom: 1.5rem; }
    a.home { display: inline-block; background: transparent; color: #b76eff; border: 2px solid #b76eff; padding: 0.7rem 1.8rem; border-radius: 3rem; font-weight: 700; text-decoration: none; margin: 0.3rem; }
    a.home:hover { background: #b76eff; color: #0a0718; }
  </style>
</head>
<body>
  <div class="box">
    <h1>404</h1>
    <p>This page doesn't exist. / Эта страница не найдена. / Esta página no existe. / यह पेज नहीं मिला।</p>
    <a class="home" href="/astroscan_bot/">English</a>
    <a class="home" href="/astroscan_bot/ru/">Русский</a>
    <a class="home" href="/astroscan_bot/es/">Español</a>
    <a class="home" href="/astroscan_bot/hi/">हिन्दी</a>
  </div>
</body>
</html>
